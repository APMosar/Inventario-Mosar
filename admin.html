<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel MOSAR</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, #0f172a, #1a1f3a, #0f172a);
      border-bottom: 1px solid rgba(34,197,94,0.2);
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .live-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #22c55e;
    }
    .pulse-dot {
      width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .container { padding: 24px 30px; max-width: 1400px; margin: 0 auto; }

    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi {
      background: linear-gradient(135deg, #1e293b, #1a2332);
      border: 1px solid #334155; border-radius: 16px; padding: 20px;
      position: relative; overflow: hidden;
    }
    .kpi::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 80px; height: 80px; border-radius: 0 0 0 80px; opacity: 0.05;
    }
    .kpi:nth-child(1)::after { background: #22c55e; }
    .kpi:nth-child(2)::after { background: #f59e0b; }
    .kpi:nth-child(3)::after { background: #3b82f6; }
    .kpi:nth-child(4)::after { background: #a855f7; }
    .kpi-icon { font-size: 28px; margin-bottom: 8px; }
    .kpi-value { font-size: 36px; font-weight: 800; color: #fff; line-height: 1; }
    .kpi-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .main-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }

    .card {
      background: linear-gradient(180deg, #1e293b, #192231);
      border: 1px solid #334155; border-radius: 16px; overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid #334155;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-title {
      font-size: 14px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #94a3b8;
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 16px 20px; }

    .user-card {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
      transition: border-color 0.3s;
    }
    .user-card:hover { border-color: #22c55e44; }
    .user-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: #fff; flex-shrink: 0;
    }
    .user-name-text { font-weight: 700; font-size: 15px; color: #fff; }
    .user-id-text { font-size: 11px; color: #475569; font-family: monospace; margin-top: 2px; }
    .user-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .user-badge {
      padding: 4px 12px; border-radius: 8px; font-size: 12px;
      font-weight: 600; font-family: 'Segoe UI Mono', monospace; white-space: nowrap;
    }
    .badge-online { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-cart { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-empty { background: rgba(100,116,139,0.15); color: #64748b; }
    .user-meta { display: flex; gap: 16px; font-size: 12px; color: #64748b; flex-wrap: wrap; }
    .user-meta span { display: flex; align-items: center; gap: 4px; }

    .cart-detail {
      margin-top: 10px; background: #0a0e1a; border-radius: 8px;
      padding: 12px; font-size: 12px; display: none;
    }
    .cart-detail.show { display: block; }
    .cart-item {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #1e293b; color: #94a3b8;
    }
    .cart-item:last-child { border: none; }
    .cart-total {
      display: flex; justify-content: space-between; padding-top: 8px; margin-top: 4px;
      border-top: 1px solid #334155; font-weight: 700; color: #f59e0b; font-size: 14px;
    }
    .toggle-cart {
      background: none; border: 1px solid rgba(245,158,11,0.3); color: #f59e0b;
      font-size: 12px; cursor: pointer; padding: 4px 10px; border-radius: 6px; margin-top: 8px;
    }
    .toggle-cart:hover { background: rgba(245,158,11,0.1); }

    .timeline { position: relative; padding-left: 24px; }
    .timeline::before {
      content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px;
      width: 2px; background: #1e293b;
    }
    .timeline-item { position: relative; padding-bottom: 16px; }
    .timeline-item::before {
      content: ''; position: absolute; left: -23px; top: 6px;
      width: 10px; height: 10px; border-radius: 50%; border: 2px solid;
    }
    .timeline-item.busqueda::before { border-color: #f59e0b; background: rgba(245,158,11,0.3); }
    .timeline-item.login::before { border-color: #22c55e; background: rgba(34,197,94,0.3); }
    .timeline-item.carrito::before { border-color: #3b82f6; background: rgba(59,130,246,0.3); }
    .tl-time { font-size: 11px; color: #475569; font-family: monospace; margin-bottom: 2px; }
    .tl-content { font-size: 13px; color: #cbd5e1; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tl-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-busqueda { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .tag-login { background: rgba(34,197,94,0.1); color: #22c55e; }
    .tag-carrito { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .tl-user { color: #fff; font-weight: 600; }

    .empty { text-align: center; padding: 40px 20px; color: #334155; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-text { font-size: 14px; }

    .error-box {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; padding: 12px 16px; border-radius: 10px;
      font-size: 12px; font-family: monospace; margin: 0 30px 20px; word-break: break-all;
    }

    .refresh-bar {
      height: 2px; background: linear-gradient(90deg, transparent, #22c55e, transparent);
      position: fixed; top: 0; left: 0; right: 0; opacity: 0; transition: opacity 0.3s;
      z-index: 999;
    }
    .refresh-bar.active { opacity: 1; animation: sweep 1s linear; }
    @keyframes sweep { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    @media (max-width: 1024px) { .kpis { grid-template-columns: repeat(2, 1fr); } .main-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .kpis { grid-template-columns: 1fr 1fr; gap: 10px; } .container { padding: 16px; } .header { padding: 16px; } .user-top { flex-direction: column; gap: 8px; } .user-badges { justify-content: flex-start; } }
  </style>
</head>
<body>
  <div class="refresh-bar" id="refreshBar"></div>

  <div class="header">
    <h1>🕵️ Panel MOSAR</h1>
    <div class="live-badge"><span class="pulse-dot"></span> EN VIVO</div>
  </div>

  <div id="erroresGenerales" class="error-box" style="display:none;"></div>

  <div class="container">
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-icon">👁️</div>
        <div class="kpi-value" id="kpiOnline">0</div>
        <div class="kpi-label">En línea ahora</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🛒</div>
        <div class="kpi-value" id="kpiCarritos">0</div>
        <div class="kpi-label">Con carrito activo</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">📦</div>
        <div class="kpi-value" id="kpiItems">0</div>
        <div class="kpi-label">Productos en carritos</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">💰</div>
        <div class="kpi-value" id="kpiTotal">$0</div>
        <div class="kpi-label">Valor en carritos</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="pulse-dot"></span> Usuarios activos</div>
          <span style="font-size:12px;color:#475569;" id="lastUpdate">--</span>
        </div>
        <div class="card-body" id="liveUsers" style="max-height:600px;overflow-y:auto;">
          <div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Conectando...</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">📊 Actividad reciente</div>
        </div>
        <div class="card-body" id="historialAcciones" style="max-height:600px;overflow-y:auto;">
          <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Cargando historial...</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPA_URL = 'https://aetktfzewcrmetqyxbew.supabase.co';
    const SUPA_KEY = 'sb_publishable_QEHgCTmk9El1nJpMP-07Ig_Qbv4Wox5';

    const divUsers = document.getElementById('liveUsers');
    const divLogs = document.getElementById('historialAcciones');
    const divErrores = document.getElementById('erroresGenerales');
    const refreshBar = document.getElementById('refreshBar');

    let usuariosCache = {};
    let nombresCache = {};
    let carritosCache = {};

    function mostrarError(titulo, mensaje) {
      console.error(titulo, mensaje);
      divErrores.style.display = 'block';
      divErrores.innerHTML += `<b>${titulo}:</b> ${mensaje}<br>`;
    }

    function triggerRefresh() {
      refreshBar.classList.remove('active');
      void refreshBar.offsetWidth;
      refreshBar.classList.add('active');
      setTimeout(() => refreshBar.classList.remove('active'), 1000);
    }

    try {
      const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

      // ─── PRESENCIA EN VIVO ───
      const canal = supabase.channel('mosar-online', {
        config: { presence: { key: 'admin-mosar-panel' } }
      });

      canal.on('presence', { event: 'sync' }, async () => {
        triggerRefresh();
        const state = canal.presenceState();
        const users = Object.values(state).flat().filter(u => u.user_id && u.user_id !== 'admin-mosar-panel');

        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('es-MX', {
          hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Monterrey'
        });

        if (users.length === 0) {
          divUsers.innerHTML = '<div class="empty"><div class="empty-icon">🏠</div><div class="empty-text">Nadie conectado ahora mismo</div></div>';
          document.getElementById('kpiOnline').textContent = '0';
          document.getElementById('kpiCarritos').textContent = '0';
          document.getElementById('kpiItems').textContent = '0';
          document.getElementById('kpiTotal').textContent = '$0';
          usuariosCache = {};
          return;
        }

        // Actualizar cache de presencia con la hora REAL que envió el cliente
        const idsActuales = new Set();
        users.forEach(u => {
          idsActuales.add(u.user_id);
          usuariosCache[u.user_id] = {
            hora_entrada: u.hora_entrada || Date.now(),
            pagina: u.pagina_actual || '/'
          };
        });
        // Limpiar los que se fueron
        Object.keys(usuariosCache).forEach(id => {
          if (!idsActuales.has(id)) delete usuariosCache[id];
        });

        // ─── Consultar nombres de clientes ───
        const idsSinNombre = [...idsActuales].filter(id => !nombresCache[id]);
        if (idsSinNombre.length > 0) {
          try {
            const { data: clientes } = await supabase
              .from('clientes_mayoreo')
              .select('id, nombre, razon_social, email')
              .in('id', idsSinNombre);
            if (clientes) {
              clientes.forEach(c => {
                nombresCache[c.id] = c.nombre || c.razon_social || c.email || c.id.substring(0, 8);
              });
            }
          } catch(e) { /* silencio */ }
          idsSinNombre.forEach(id => {
            if (!nombresCache[id]) nombresCache[id] = id.substring(0, 8);
          });
        }

        // ─── Consultar carritos ───
        const allIds = [...idsActuales];
        try {
          const { data: carritos } = await supabase
            .from('carrito_mayoreo')
            .select('cliente_id, productos_json')
            .in('cliente_id', allIds);
          if (carritos && carritos.length > 0) {
            carritosCache = {};
            carritos.forEach(c => {
              let items = [];
              try {
                items = typeof c.productos_json === 'string' ? JSON.parse(c.productos_json) : (Array.isArray(c.productos_json) ? c.productos_json : []);
              } catch(e) { items = []; }
              carritosCache[c.cliente_id] = items;
            });
          } else {
            carritosCache = {};
          }
        } catch(e) { console.warn('Carritos no disponibles:', e); }

        renderUsuarios(users);
        actualizarKPIs();
      });

      canal.subscribe(async (status, err) => {
        if (err) mostrarError('Presencia', err.message);
        if (status === 'SUBSCRIBED') {
          divUsers.innerHTML = '<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Esperando clientes...</div></div>';
        }
      });

      // ─── Timer: actualizar segundos cada segundo SIN recargar datos ───
      setInterval(() => {
        document.querySelectorAll('[data-entrada]').forEach(el => {
          const entrada = parseInt(el.dataset.entrada);
          const diff = Date.now() - entrada;
          const min = Math.floor(diff / 60000);
          const seg = Math.floor((diff % 60000) / 1000);
          el.textContent = min > 0 ? `${min}m ${seg.toString().padStart(2, '0')}s` : `${seg}s`;
        });
      }, 1000);

      function renderUsuarios(users) {
        if (users.length === 0) return;
        let html = '';
        users.forEach(u => {
          const id = u.user_id;
          const nombre = nombresCache[id] || id.substring(0, 8);
          const inicial = nombre.charAt(0).toUpperCase();
          const carrito = carritosCache[id] || [];
          const tieneCarrito = carrito.length > 0;

          let totalCarrito = 0, totalItems = 0, cartItemsHtml = '';
          carrito.forEach(item => {
            const precio = parseFloat(item.precio) || 0;
            const cant = parseInt(item.cantidad) || 1;
            totalCarrito += precio * cant;
            totalItems += cant;
            const nombreProd = item.nombre || item.producto || item.nombre_producto || 'Producto';
            cartItemsHtml += `<div class="cart-item"><span>${nombreProd} x${cant}</span><span>$${(precio * cant).toLocaleString('es-MX')}</span></div>`;
          });

          const pagina = usuariosCache[id]?.pagina || '/';
          const entrada = usuariosCache[id]?.hora_entrada || Date.now();
          const diff = Date.now() - entrada;
          const min = Math.floor(diff / 60000);
          const seg = Math.floor((diff % 60000) / 1000);
          const tiempoTexto = min > 0 ? `${min}m ${seg.toString().padStart(2, '0')}s` : `${seg}s`;

          const badgeCart = tieneCarrito
            ? `<span class="user-badge badge-cart">🛒 ${totalItems} items · $${totalCarrito.toLocaleString('es-MX')}</span>`
            : `<span class="user-badge badge-empty">Carrito vacío</span>`;

          html += `
            <div class="user-card">
              <div class="user-top">
                <div class="user-info">
                  <div class="user-avatar">${inicial}</div>
                  <div>
                    <div class="user-name-text">${nombre}</div>
                    <div class="user-id-text">${id}</div>
                  </div>
                </div>
                <div class="user-badges">
                  ${badgeCart}
                  <span class="user-badge badge-online" data-entrada="${entrada}">${tiempoTexto}</span>
                </div>
              </div>
              <div class="user-meta">
                <span>📍 ${pagina}</span>
                <span>🕐 Entró: ${new Date(entrada).toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit',timeZone:'America/Monterrey'})}</span>
              </div>
              ${tieneCarrito ? `
                <button class="toggle-cart" onclick="this.nextElementSibling.classList.toggle('show')">▼ Ver detalle del carrito</button>
                <div class="cart-detail">
                  ${cartItemsHtml}
                  <div class="cart-total"><span>Total</span><span>$${totalCarrito.toLocaleString('es-MX')}</span></div>
                </div>
              ` : ''}
            </div>`;
        });
        divUsers.innerHTML = html;
      }

      function actualizarKPIs() {
        const online = Object.keys(usuariosCache).length;
        let conCarrito = 0, totalItems = 0, valorTotal = 0;
        Object.keys(usuariosCache).forEach(id => {
          const carrito = carritosCache[id] || [];
          if (carrito.length > 0) {
            conCarrito++;
            carrito.forEach(item => {
              const cant = parseInt(item.cantidad) || 1;
              totalItems += cant;
              valorTotal += (parseFloat(item.precio) || 0) * cant;
            });
          }
        });
        document.getElementById('kpiOnline').textContent = online;
        document.getElementById('kpiCarritos').textContent = conCarrito;
        document.getElementById('kpiItems').textContent = totalItems;
        document.getElementById('kpiTotal').textContent = '$' + valorTotal.toLocaleString('es-MX');
      }

      // ─── HISTORIAL ───
      async function cargarHistorial() {
        try {
          const res = await fetch(SUPA_URL + '/rest/v1/log_spy?select=*&order=fecha.desc&limit=50', {
            headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
          });
          if (!res.ok) throw new Error(`Status ${res.status}: ${await res.text()}`);
          const data = await res.json();

          if (!data.length) {
            divLogs.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Sin actividad registrada</div></div>';
            return;
          }

          // Nombres para historial
          const idsLog = [...new Set(data.map(l => l.cliente_id).filter(Boolean))];
          const idsFaltantes = idsLog.filter(id => !nombresCache[id]);
          if (idsFaltantes.length > 0) {
            try {
              const { data: clientes } = await supabase
                .from('clientes_mayoreo')
                .select('id, nombre, razon_social, email')
                .in('id', idsFaltantes);
              if (clientes) clientes.forEach(c => {
                nombresCache[c.id] = c.nombre || c.razon_social || c.email || c.id.substring(0, 8);
              });
            } catch(e) { /* silencio */ }
          }

          let html = '<div class="timeline">';
          data.forEach(log => {
            const fecha = new Date(log.fecha).toLocaleTimeString('es-MX', {
              hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Monterrey'
            });
            const nombre = nombresCache[log.cliente_id] || 'Invitado';
            const accion = log.accion || 'login';
            const detalle = log.detalle || '';

            let tipoClase = 'login', tagClase = 'tag-login', tagTexto = '🔑 Entró';
            if (accion === 'busqueda') { tipoClase = 'busqueda'; tagClase = 'tag-busqueda'; tagTexto = '🔍 Buscó'; }
            else if (accion === 'carrito') { tipoClase = 'carrito'; tagClase = 'tag-carrito'; tagTexto = '🛒 Carrito'; }

            html += `
              <div class="timeline-item ${tipoClase}">
                <div class="tl-time">${fecha}</div>
                <div class="tl-content">
                  <span class="tl-tag ${tagClase}">${tagTexto}</span>
                  <span class="tl-user">${nombre}</span>
                  ${detalle ? `<span style="color:#94a3b8;">${detalle}</span>` : ''}
                </div>
              </div>`;
          });
          html += '</div>';
          divLogs.innerHTML = html;
        } catch(e) {
          divLogs.innerHTML = `<div class="error-box" style="margin:0;">Error:<br>${e.message}<br><br><b>¿Existe la tabla 'log_spy'?</b></div>`;
        }
      }

      cargarHistorial();
      setInterval(cargarHistorial, 15000);

    } catch(e) {
      mostrarError('Error Fatal', e.message);
    }
  </script>
</body>
</html>
